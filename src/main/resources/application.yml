spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:webee}
    username: ${DATABASE_USER:root}
    password: ${DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:5}
      minimum-idle: ${HIKARI_MAX_POOL_SIZE:10}
      connection-timeout: 3000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          maxCompletionTokens: 3000

    vector-store:
      redis:
        uri: ${RAG_REDIS_URI:redis://localhost:6379}
        initialize-schema: true
        index: 'app-index'
        prefix: 'app:'

  servlet:
    multipart:
      max-file-size: 3MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          timeout: 5000
          starttls:
            enable: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG

jwt:
  secret: ${JWT_SECRET_KEY:webee-temporary-secret-key}
  access-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:86400000}
  issuer: ${JWT_ISSUER:webee}

kakao:
  api-key: ${KAKAO_REST_API_KEY:}

solapi:
  api-key: ${SOLAPI_API_KEY:}
  api-secret: ${SOLAPI_API_SECRET:}
  from-number: ${SOLAPI_FROM_NUMBER:}

was:
  api: ${WAS_API:http://localhost:8080}
  cors-allow-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080}

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
      region: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET:}
      cdn-url: ${AWS_CDN_URL:}

app:
  ai:
    max-messages: 5
    vector-store:
      topK: 5
      similarity-threshold: 0.75

    prompts:
      assistant-prompt: classpath:prompts/assistant/assistant-prompt.txt
      bee-recommendation-prompt: classpath:prompts/recommendation/bee_recommendation_prompt.txt
      bee-recommendation-prompt-kor: classpath:prompts/recommendation/bee_recommendation_prompt_kor.txt
      bee-recommendation-query: classpath:prompts/recommendation/bee_recommendation_query.txt
      bee-disease-solution-query: classpath:prompts/disease/bee_disease_solution_query.txt
      bee-disease-solution-prompt: classpath:prompts/disease/bee_disease_solution_prompt.txt
      harvest-prediction-prompt: classpath:prompts/report/harvest_prediction_prompt.txt

bee:
  diagnosis:
    api-url: ${BEE_DIAGNOSIS_API_URL:http://localhost:5001/predict}
  recommendation:
    nongsaro:
      request-parameter-list: classpath:nongsaro-crop-pollination-request-parameter-list.csv

business-certificate-validation:
  api-key: ${BUSINESS_CERTIFICATE_API_KEY:}

oauth2:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URL:}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    redirect-uri: ${NAVER_REDIRECT_URL:}
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me

mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  inbound-client-id: ${MQTT_INBOUND_CLIENT_ID:server-inbound}
  outbound-client-id: ${MQTT_OUTBOUND_CLIENT_ID:server-outbound}
  topic-filter: ${MQTT_TOPIC_FILTER:server-inbound}
  username: ${MQTT_USERNAME:username}
  password: ${MQTT_PASSWORD:password}

firebase:
  key-path: ${FIREBASE_KEY_PATH:}

management:
  endpoints:
    web:
      exposure:
        include: "health,metrics,info,prometheus"
  endpoint:
    health:
      show-details: always  # 상세한 헬스 정보 표시

rabbitmq:
  queue-name: ${RABBITMQ_QUEUE_NAME:queue}
  exchange-name: ${RABBITMQ_EXCHANGE_NAME:exchange}
  routing-key: ${RABBITMQ_ROUTING_KEY:key}